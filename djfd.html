let audioCtx = null;
let currentSource = null;
let prefetchedBuffer = null;
let prefetchedText = null;

function getAudioContext() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

async function fetchBuffer(text) {
  const voiceId = voiceMap[document.getElementById('voiceSelect').value] || voiceMap['Rachel'];
  const speed = parseFloat(document.getElementById('speedSelect').value);
  const res = await fetch('https://api.elevenlabs.io/v1/text-to-speech/' + voiceId, {
    method: 'POST',
    headers: { 'xi-api-key': API_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({
      text,
      model_id: 'eleven_monolingual_v1',
      voice_settings: { stability: 0.5, similarity_boost: 0.75, speed }
    })
  });
  if (!res.ok) return null;
  const arrayBuffer = await res.arrayBuffer();
  const ctx = getAudioContext();
  return await ctx.decodeAudioData(arrayBuffer);
}

async function speakEL(text, onEnd) {
  if (stopFlag) { onEnd(); return; }
  try {
    let buffer;
    if (prefetchedText === text && prefetchedBuffer) {
      buffer = prefetchedBuffer;
      prefetchedBuffer = null;
      prefetchedText = null;
    } else {
      buffer = await fetchBuffer(text);
    }
    if (!buffer || stopFlag) { onEnd(); return; }

    const ctx = getAudioContext();
    if (currentSource) { try { currentSource.stop(); } catch(e) {} currentSource = null; }

    const source = ctx.createBufferSource();
    source.buffer = buffer;
    source.connect(ctx.destination);
    source.onended = () => { currentSource = null; onEnd(); };
    currentSource = source;
    source.start(0);
  } catch(e) { onEnd(); }
}

function prefetchNext(text) {
  if (!text || prefetchedText === text) return;
  prefetchedText = text;
  prefetchedBuffer = null;
  fetchBuffer(text).then(b => {
    if (b && prefetchedText === text) prefetchedBuffer = b;
  }).catch(() => {});
}

// Fix stopReading to stop AudioContext source
function stopCurrentAudio() {
  if (currentSource) { try { currentSource.stop(); } catch(e) {} currentSource = null; }
}

let showSentences = true;
let isReading = false;
let currentIndex = 0;
let stopFlag = false;

const STORAGE_KEY = 'dict_known_words_v1';
let knownWords = [];
try { knownWords = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch(e) {}
function saveKnown() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(knownWords)); } catch(e) {} }

const list = document.getElementById('wordList');
words.forEach((w, i) => {
  const row = document.createElement('div');
  row.className = 'row';
  row.id = 'row-' + i;
  row.dataset.english = w[0];
  row.innerHTML = `
    <div class="row-top">
      <span class="num">${i+1}</span>
      <span class="en">${w[0]}</span>
      <span class="he" data-text="${w[1].replace(/"/g, '&quot;')}">${w[1]}</span>
      <span class="speaker">🔊</span>
      <button class="know-btn" title="אני יודעת">✓</button>
    </div>
    <div class="sentence">${w[2]}</div>
  `;
  row.querySelector('.en').onclick = (e) => {
    e.stopPropagation();
    if (!isReading) { currentIndex = i; startReading(i); }
  };
  row.querySelector('.sentence').onclick = (e) => {
    e.stopPropagation();
    if (!isReading) { currentIndex = i; startReading(i); }
  };
  const heEl = row.querySelector('.he');
  heEl.onclick = (e) => {
    e.stopPropagation();
    heEl.classList.toggle('revealed');
  };
  row.querySelector('.know-btn').onclick = (e) => {
    e.stopPropagation();
    markAsKnown(w[0]);
  };
  list.appendChild(row);
});

applyKnownFilter();

function markAsKnown(english) {
  if (!knownWords.includes(english)) { knownWords.push(english); saveKnown(); }
  applyKnownFilter();
}

function restoreWord(english) {
  knownWords = knownWords.filter(w => w !== english);
  saveKnown(); applyKnownFilter();
}

function resetKnown() {
  if (knownWords.length === 0) { alert('אין מילים מסומנות לאיפוס'); return; }
  if (confirm(`האם לאפס את כל ${knownWords.length} המילים?`)) {
    knownWords = []; saveKnown(); applyKnownFilter();
  }
}

function applyKnownFilter() {
  document.querySelectorAll('.row').forEach(row => {
    row.classList.toggle('hidden-known', knownWords.includes(row.dataset.english));
  });
  const knownListEl = document.getElementById('knownList');
  knownListEl.innerHTML = '';
  knownWords.forEach(eng => {
    const wordData = words.find(w => w[0] === eng);
    if (!wordData) return;
    const kr = document.createElement('div');
    kr.className = 'known-row';
    kr.innerHTML = `
      <span class="en-text">${wordData[0]}</span>
      <span class="he-text">${wordData[1]}</span>
      <button class="restore-btn" onclick="restoreWord('${eng.replace(/'/g, "\\'")}')">↩ החזר</button>
    `;
    knownListEl.appendChild(kr);
  });
  document.getElementById('knownCount').textContent = knownWords.length;
  updateStats();
}

function toggleKnownList() {
  document.getElementById('knownList').classList.toggle('show');
}

function updateStats() {
  document.getElementById('statsText').textContent = `${words.length - knownWords.length}/${words.length} נותרו`;
}

function hideAllTranslations() {
  document.querySelectorAll('.he').forEach(el => el.classList.remove('revealed'));
}

function showAllTranslations() {
  document.querySelectorAll('.he').forEach(el => el.classList.add('revealed'));
}

function toggleSentences() {
  showSentences = !showSentences;
  document.getElementById('toggleBtn').className = 'toggle-btn' + (showSentences ? '' : ' off');
  document.querySelectorAll('.sentence').forEach(s => s.style.display = showSentences ? '' : 'none');
}

function getActiveIndices() {
  return words.map((w, i) => i).filter(i => !knownWords.includes(words[i][0]));
}

function continueReading() {
  const active = getActiveIndices();
  if (active.length === 0) { alert('כל המילים מסומנות כידועות!'); return; }
  if (!active.includes(currentIndex)) currentIndex = active[0];
  startReading(currentIndex);
}

function restartReading() {
  const active = getActiveIndices();
  if (active.length === 0) { alert('כל המילים מסומנות כידועות!'); return; }
  currentIndex = active[0];
  startReading(currentIndex);
}

function startReading(from) {
  stopFlag = false; isReading = true; currentIndex = from;
  document.getElementById('btnPlay').style.display = 'none';
  document.getElementById('btnRestart').style.display = 'none';
  document.getElementById('btnStop').style.display = 'inline-block';
  readNext();
}

function stopReading() {
  stopFlag = true; isReading = false;
  stopCurrentAudio();
  document.querySelectorAll('.row.active').forEach(r => r.classList.remove('active'));
  document.getElementById('btnPlay').style.display = 'inline-block';
  document.getElementById('btnStop').style.display = 'none';
  const active = getActiveIndices();
  const showRestart = active.length > 0 && currentIndex !== active[0];
  document.getElementById('btnRestart').style.display = showRestart ? 'inline-block' : 'none';
  document.getElementById('btnPlay').textContent = showRestart ? '▶ המשך' : '▶ הקרא הכל';
  document.getElementById('statusText').textContent = showRestart ? `עצרת: ${words[currentIndex]?.[0] || ''}` : 'לחץ על מילה או הקרא הכל';
  document.getElementById('progress').style.width = Math.round((currentIndex / words.length) * 100) + '%';
}

function getNextActiveIndex(from) {
  for (let i = from + 1; i < words.length; i++) {
    if (!knownWords.includes(words[i][0])) return i;
  }
  return -1;
}

function readNext() {
  if (stopFlag) return;
  if (knownWords.includes(words[currentIndex]?.[0])) {
    const next = getNextActiveIndex(currentIndex);
    if (next === -1) { document.getElementById('statusText').textContent = '✓ סיימנו!'; stopReading(); return; }
    currentIndex = next;
  }
  if (currentIndex >= words.length) { stopReading(); return; }

  document.querySelectorAll('.row.active').forEach(r => r.classList.remove('active'));
  const row = document.getElementById('row-' + currentIndex);
  row.classList.add('active');
  row.scrollIntoView({ behavior: 'smooth', block: 'center' });

  const active = getActiveIndices();
  const pos = active.indexOf(currentIndex);
  document.getElementById('progress').style.width = (active.length > 0 ? Math.round((pos / active.length) * 100) : 0) + '%';
  document.getElementById('statusText').textContent = words[currentIndex][0];

  const thisIndex = currentIndex;
  const en = words[thisIndex][0];
  const sentence = words[thisIndex][2];

  // prefetch המילה הבאה מראש
  const nextIdx = thisIndex + 1 < words.length ? thisIndex + 1 : -1;
  if (nextIdx !== -1) prefetchNext(words[nextIdx][0]);

  const goNext = () => {
    if (stopFlag) { currentIndex = thisIndex; return; }
    currentIndex = thisIndex + 1;
    setTimeout(readNext, 400);
  };

  speakEL(en, () => {
    if (stopFlag) { currentIndex = thisIndex; return; }
    if (showSentences) {
      speakEL(sentence, goNext);
    } else {
      goNext();
    }
  });
}

document.addEventListener('visibilitychange', () => {
  if (!document.hidden && isReading && audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
});
