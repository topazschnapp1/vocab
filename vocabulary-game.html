<html lang="he">
<head>
<meta charset="UTF-8">

<title>תרגול מילים</title>
<style>

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {

    z-index: 99;
    padding: 10px 14px 12px;
    border-bottom: 1px solid #1a1a20;
  }

  .bar-row {
    display: flex;
    align-items: center;
    gap: 7px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }
  .bar-row:last-child { margin-bottom: 0; }

  .title {
    flex: 1;
    font-size: 0.78rem;
    color: #555;
    min-width: 70px;
    font-family: 'DM Mono', monospace;
  }

  .btn {
    padding: 8px 16px;
    border-radius: 22px;
    border: none;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: transform 0.1s;
  }
  .btn:active { transform: scale(0.95); }
  #btnPlay { background: #e8b931; color: #111; }
  #btnStop { background: #e84040; color: #fff; display: none; }
  #btnRestart { background: #1e1e24; color: #888; border: 1px solid #333; font-size: 0.78rem; padding: 7px 12px; display: none; }

  .pill {
    padding: 6px 12px;
    border-radius: 18px;
    font-size: 0.75rem;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    border: 1px solid;
    transition: transform 0.1s;
  }
  .pill:active { transform: scale(0.95); }

  .pill-green {
    background: #0d1f0d;
    color: #5ec45e;
    border-color: #2a4a2a;
  }
  .pill-green.off {
    background: #161618;
    color: #555;
    border-color: #2a2a2e;
  }

  .pill-red {
    background: #1f0d0d;
    color: #e86060;
    border-color: #4a2a2a;
  }
  .pill-red.off {
    background: #161618;
    color: #555;
    border-color: #2a2a2e;
  }

  .pill-blue {
    background: #0d1520;
    color: #60a0e8;
    border-color: #2a3a5a;
  }

  .remove-btn {
    padding: 6px 12px;
    border-radius: 18px;
    font-size: 0.75rem;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    border: 1px solid #5a2a2a;
    background: #2a0d0d;
    color: #ff6060;
    display: none;
    transition: transform 0.1s;
  }
  .remove-btn:active { transform: scale(0.95); }

  .count-text {
    font-size: 0.7rem;
    color: #444;
    font-family: 'DM Mono', monospace;
    margin-left: auto;
  }
  .count-text b { color: #e8b931; }

  .voice-group {
    display: flex;
    align-items: center;
    gap: 5px;
    flex: 1;
    min-width: 130px;
  }
  .voice-label {
    font-size: 0.7rem;
    color: #555;
    white-space: nowrap;
  }
  select {
    flex: 1;
    background: #141418;
    color: #ccc;
    border: 1px solid #2a2a2e;
    border-radius: 8px;
    padding: 5px 8px;
    font-size: 0.72rem;
    outline: none;
    max-width: 170px;
    font-family: 'DM Sans', sans-serif;
  }

  .progress {
    position: fixed;
    top: 0; left: 0;
    height: 3px;
    background: linear-gradient(90deg, #e8b931, #f0d060);
    width: 0;
    transition: width 0.3s;
    z-index: 999;
  }

  .words { padding: 4px 0; }

  .row {
    padding: 14px 16px;
    border-bottom: 1px solid #141418;
    scroll-margin-top: 140px;
    transition: background 0.2s;
    cursor: pointer;
    position: relative;
  }
  .row:active { background: #12121a; }
  .row.active { background: #18160a; }
  .row.marked { background: #140808; }
  .row.removed { display: none; }

  .row-top {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .num {
    font-size: 0.68rem;
    color: #333;
    min-width: 24px;
    font-family: 'DM Mono', monospace;
  }

  .check-box {
    width: 22px;
    height: 22px;
    border-radius: 6px;
    border: 2px solid #2a2a2e;
    background: #141418;
    display: none;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 0.65rem;
    cursor: pointer;
    transition: all 0.15s;

  .check-box.visible { display: flex; }
  .check-box.checked {
    background: #e84040;
    border-color: #e84040;
    color: #fff;
  }

    font-size: 1.05rem;
    font-weight: 700;
    flex: 1;
    color: #eee;
    letter-spacing: -0.01em;
  }
  .row.active .en { color: #e8b931; }
  .row.marked .en { color: #e86060; text-decoration: line-through; }

  .he-wrap {
    direction: rtl;
    text-align: right;
    flex-shrink: 0;
  }
  .he {
    font-size: 0.85rem;
    color: #888;
    padding: 3px 10px;
    border-radius: 6px;
    background: #141418;
    display: inline-block;
    filter: blur(7px);
    transition: filter 0.3s ease;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
  }
  .he.revealed {
    filter: blur(0);
    background: #0d1f0d;
    color: #7eda7e;
  }
  .row.active .he.revealed { color: #a0f0a0; }
  .row.marked .he { filter: blur(7px); }

  .speaker { font-size: 0.95rem; opacity: 0; flex-shrink: 0; }
  .row.active .speaker {
    opacity: 1;
    animation: pulse 0.7s ease-in-out infinite alternate;
  }
  @keyframes pulse {
    from { transform: scale(1); }
    to { transform: scale(1.25); }
  }

  .sentence {
    margin-top: 7px;
    padding-right: 34px;
    font-size: 0.8rem;
    color: #3a3a44;
    font-style: italic;
    line-height: 1.45;
    font-family: 'DM Mono', monospace;
  }
  .row.active .sentence { color: #888; }
</style>
</head>
<body>

<div class="progress" id="progress"></div>

</div>

let showSentences = true;
let selectMode = false;
let markedSet = new Set();
let removedSet = new Set(JSON.parse(localStorage.getItem('dict2_removed') || '[]'));
let lastRemoved = null;

function saveRemoved() {
  localStorage.setItem('dict2_removed', JSON.stringify([...removedSet]));
}

const totalCount = words.length;
document.getElementById('totalCount').textContent = totalCount;

const list = document.getElementById('wordList');
words.forEach((w, i) => {
  const row = document.createElement('div');
  row.className = 'row';
  row.id = 'row-' + i;
  row.innerHTML = `
    <div class="row-top">
      <span class="num">${i+1}</span>
      <span class="check-box" id="chk-${i}" onclick="event.stopPropagation(); toggleMark(${i})"></span>
      <span class="en">${w[0]}</span>
      <span class="he-wrap"><span class="he" id="he-${i}" onclick="event.stopPropagation(); revealHe(${i})">${w[1]}</span></span>
      <span class="speaker">🔊</span>
    </div>
    <div class="sentence">${w[2]}</div>
  `;
  row.onclick = () => {
    if (selectMode) { toggleMark(i); }
    else if (!isReading) { currentIndex = i; startReading(i); }
  };
  list.appendChild(row);
});

// Apply saved removals
removedSet.forEach(idx => {
  const row = document.getElementById('row-' + idx);
  if (row) row.classList.add('removed');
});
updateRemainCount();
renumber();
updateRestoreBtn();

function revealHe(i) {
  document.getElementById('he-' + i).classList.toggle('revealed');
}

function toggleMode() {
  selectMode = !selectMode;
  const btn = document.getElementById('modeBtn');
  if (selectMode) {
    btn.classList.remove('off');
    btn.textContent = '🗑 בחירה פעילה';
    document.querySelectorAll('.check-box').forEach(c => c.classList.add('visible'));
  } else {
    btn.classList.add('off');
    btn.textContent = '🗑 סמן';
    document.querySelectorAll('.check-box').forEach(c => c.classList.remove('visible'));
    markedSet.forEach(idx => {
      document.getElementById('row-' + idx).classList.remove('marked');
      document.getElementById('chk-' + idx).classList.remove('checked');
      document.getElementById('chk-' + idx).textContent = '';
    });
    markedSet.clear();
    document.getElementById('removeBtn').style.display = 'none';
  }
}

function toggleMark(i) {
  if (!selectMode) return;
  const row = document.getElementById('row-' + i);
  const chk = document.getElementById('chk-' + i);
  if (markedSet.has(i)) {
    markedSet.delete(i);
    row.classList.remove('marked');
    chk.classList.remove('checked');
    chk.textContent = '';
  } else {
    markedSet.add(i);
    row.classList.add('marked');
    chk.classList.add('checked');
    chk.textContent = '✓';
  }
  document.getElementById('removeBtn').style.display = markedSet.size > 0 ? 'inline-block' : 'none';
  document.getElementById('removeBtn').textContent = `🗑 הסר ${markedSet.size}`;
}

function removeMarked() {
  if (markedSet.size === 0) return;
  lastRemoved = new Set(markedSet);
  markedSet.forEach(idx => {
    removedSet.add(idx);
    const row = document.getElementById('row-' + idx);
    row.classList.add('removed');
    row.classList.remove('marked');
    document.getElementById('chk-' + idx).classList.remove('checked');
    document.getElementById('chk-' + idx).textContent = '';
  });
  markedSet.clear();
  document.getElementById('removeBtn').style.display = 'none';
  document.getElementById('undoBtn').style.display = 'inline-block';
  document.getElementById('undoBtn').textContent = `↩ בטל (${lastRemoved.size})`;
  updateRemainCount();
  renumber();
  saveRemoved();
  updateRestoreBtn();
}

function undoRemove() {
  if (!lastRemoved) return;
  lastRemoved.forEach(idx => {
    removedSet.delete(idx);
    document.getElementById('row-' + idx).classList.remove('removed');
  });
  lastRemoved = null;
  document.getElementById('undoBtn').style.display = 'none';
  updateRemainCount();
  renumber();
  saveRemoved();
  updateRestoreBtn();
}

function restoreAll() {
  if (removedSet.size === 0) return;
  removedSet.forEach(idx => {
    document.getElementById('row-' + idx).classList.remove('removed');
  });
  removedSet.clear();
  lastRemoved = null;
  document.getElementById('undoBtn').style.display = 'none';
  updateRemainCount();
  renumber();
  saveRemoved();
  updateRestoreBtn();
}

function updateRestoreBtn() {
  document.getElementById('restoreBtn').style.display = removedSet.size > 0 ? 'inline-block' : 'none';
}

function updateRemainCount() {
  document.getElementById('remainCount').textContent = totalCount - removedSet.size;
}

function renumber() {
  let n = 1;
  words.forEach((w, i) => {
    if (!removedSet.has(i)) {
      document.getElementById('row-' + i).querySelector('.num').textContent = n;
      n++;
    }
  });
}

let currentAudio = null;

async function speakEL(text, onEnd) {
  const voiceName = document.getElementById('voiceSelect').value;
  const speed = parseFloat(document.getElementById('speedSelect').value);
  const voiceId = voiceMap[voiceName] || voiceMap['Rachel'];

  try {
    const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`, {
      method: 'POST',
      headers: { 'xi-api-key': API_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        text: text,
        model_id: 'eleven_monolingual_v1',
        voice_settings: { stability: 0.5, similarity_boost: 0.75, speed: speed }
      })
    });

    if (!response.ok) { console.error('ElevenLabs error:', response.status); onEnd(); return; }

    const blob = await response.blob();
    const url = URL.createObjectURL(blob);

    if (currentAudio) { currentAudio.pause(); currentAudio = null; }

    currentAudio = new Audio(url);
    currentAudio.onended = () => { URL.revokeObjectURL(url); onEnd(); };
    currentAudio.onerror = () => { URL.revokeObjectURL(url); onEnd(); };
    currentAudio.play();
  } catch(err) {
    console.error('TTS error:', err);
    onEnd();
  }
}

function toggleSentences() {
  showSentences = !showSentences;
  const btn = document.getElementById('toggleBtn');
  btn.className = 'pill pill-green' + (showSentences ? '' : ' off');
  document.querySelectorAll('.sentence').forEach(s => { s.style.display = showSentences ? '' : 'none'; });
}

let isReading = false;
let currentIndex = 0;
let stopFlag = false;

function getActiveIndices() {
  const arr = [];
  words.forEach((w, i) => { if (!removedSet.has(i)) arr.push(i); });
  return arr;
}

function continueReading() { startReading(currentIndex); }

function restartReading() {
  const active = getActiveIndices();
  if (active.length === 0) return;
  currentIndex = active[0];
  startReading(currentIndex);
}

function startReading(fromIndex = 0) {
  if (selectMode) toggleMode();
  stopFlag = false;
  isReading = true;
  currentIndex = fromIndex;
  document.getElementById('btnPlay').style.display = 'none';
  document.getElementById('btnRestart').style.display = 'none';
  document.getElementById('btnStop').style.display = 'inline-block';
  readNext();
}

function stopReading() {
  stopFlag = true;
  isReading = false;
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  document.querySelectorAll('.row.active').forEach(r => r.classList.remove('active'));
  document.getElementById('btnPlay').style.display = 'inline-block';
  document.getElementById('btnStop').style.display = 'none';
  const active = getActiveIndices();
  const pos = active.indexOf(currentIndex);
  document.getElementById('btnRestart').style.display = pos > 0 ? 'inline-block' : 'none';
  document.getElementById('btnPlay').textContent = pos > 0 ? '▶ המשך' : '▶ הקרא הכל';
  document.getElementById('statusText').textContent = pos > 0 ? `${words[currentIndex]?.[0] || ''}` : 'לחץ על מילה או הקרא הכל';
  document.getElementById('progress').style.width = active.length > 0 ? Math.round((pos / active.length) * 100) + '%' : '0%';
}

function readNext() {
  const active = getActiveIndices();
  const pos = active.indexOf(currentIndex);

  if (stopFlag || pos === -1 || pos >= active.length) {
    if (!stopFlag && pos === -1) {
      const nextActive = active.find(idx => idx >= currentIndex);
      if (nextActive !== undefined) { currentIndex = nextActive; readNext(); return; }
    }
    if (!stopFlag) document.getElementById('statusText').textContent = '✓ סיימנו!';
    stopReading();
    return;
  }

  document.querySelectorAll('.row.active').forEach(r => r.classList.remove('active'));
  const row = document.getElementById('row-' + currentIndex);
  row.classList.add('active');
  row.scrollIntoView({ behavior: 'smooth', block: 'center' });

  document.getElementById('progress').style.width = Math.round((pos / active.length) * 100) + '%';
  document.getElementById('statusText').textContent = words[currentIndex][0];

  const [en, he, sentence] = words[currentIndex];
  const savedIndex = currentIndex;

  speakEL(en, () => {
    if (stopFlag) { currentIndex = savedIndex; return; }
    if (showSentences) {
      speakEL(sentence, () => {
        if (stopFlag) { currentIndex = savedIndex; return; }
        const nextPos = active.indexOf(savedIndex) + 1;
        if (nextPos < active.length) { currentIndex = active[nextPos]; } else { currentIndex = words.length; }
        setTimeout(readNext, 400);
      });
    } else {
      const nextPos = active.indexOf(savedIndex) + 1;
      if (nextPos < active.length) { currentIndex = active[nextPos]; } else { currentIndex = words.length; }
      setTimeout(readNext, 400);
    }
  });
}

document.addEventListener('visibilitychange', () => {
  if (!document.hidden && isReading && currentAudio) currentAudio.play();
});
