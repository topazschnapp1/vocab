let currentAudio = null;
let isReading = false;
let stopFlag = false;
let currentIndex = 0;

async function speakEL(text, onEnd) {
  if (stopFlag) { onEnd(); return; }
  const voiceName = document.getElementById('voiceSelect').value;
  const speed = parseFloat(document.getElementById('speedSelect').value);
  const voiceId = voiceMap[voiceName] || voiceMap['Rachel'];
  try {
    const response = await fetch('https://api.elevenlabs.io/v1/text-to-speech/' + voiceId, {
      method: 'POST',
      headers: { 'xi-api-key': API_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        text: text,
        model_id: 'eleven_monolingual_v1',
        voice_settings: { stability: 0.5, similarity_boost: 0.75, speed: speed }
      })
    });
    if (!response.ok) { onEnd(); return; }
    const blob = await response.blob();
    const url = URL.createObjectURL(blob);
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
    currentAudio = new Audio(url);
    currentAudio.onended = () => { URL.revokeObjectURL(url); onEnd(); };
    currentAudio.onerror = () => { URL.revokeObjectURL(url); onEnd(); };
    await currentAudio.play();
  } catch(err) {
    console.error('EL error:', err);
    onEnd();
  }
}

  ["Ignorance","בורות","Ignorance of current events can lead to poor decisions.","בורות לגבי אירועים אקטואליים יכולה להוביל להחלטות גרועות."]

let showSentences = true;
let knownWords = {};
try { knownWords = JSON.parse(localStorage.getItem('knownWords2') || '{}'); } catch(e) {}

function saveKnown() {
  try { localStorage.setItem('knownWords2', JSON.stringify(knownWords)); } catch(e) {}
}

const list = document.getElementById('wordList');
words.forEach((w, i) => {
  const row = document.createElement('div');
  row.className = 'row' + (knownWords[w[0]] ? ' known' : '');
  row.id = 'row-' + i;
  row.innerHTML = `
    <div class="row-top">
      <span class="num">${i+1}</span>
      <span class="en">${w[0]}</span>
      <span class="he">${w[1]}</span>
      <span class="speaker">🔊</span>
      <button class="trash-btn">🗑</button>
    </div>
    <div class="sentence-box">
      <div class="sentence">${w[2]}</div>
      <div class="sentence-he">${w[3]}</div>
    </div>
  `;
  row.querySelector('.row-top').onclick = (e) => {
    if (e.target.classList.contains('he') || e.target.classList.contains('trash-btn')) return;
    if (!isReading) { currentIndex = i; startReading(i); }
  };
  row.querySelector('.sentence').onclick = (e) => {
    e.stopPropagation();
    if (!isReading) { currentIndex = i; startReading(i); }
  };
  row.querySelector('.he').onclick = (e) => {
    e.stopPropagation();
    e.target.classList.toggle('revealed');
  };
  row.querySelector('.sentence-he').onclick = (e) => {
    e.stopPropagation();
    e.target.classList.toggle('revealed');
  };
  row.querySelector('.trash-btn').onclick = (e) => {
    e.stopPropagation();
    toggleKnown(i);
  };
  list.appendChild(row);
});

updateCounter();

function toggleKnown(i) {
  const key = words[i][0];
  const row = document.getElementById('row-' + i);
  if (knownWords[key]) { delete knownWords[key]; row.classList.remove('known'); }
  else { knownWords[key] = true; row.classList.add('known'); }
  saveKnown(); updateCounter();
}

function updateCounter() {
  const knownCount = words.filter(w => knownWords[w[0]]).length;
  document.getElementById('counter').innerHTML = `ללימוד: <b>${words.length - knownCount}</b> | יודעת: <b>${knownCount}</b>`;
}

function toggleShowKnown() {
  const btn = document.getElementById('showKnownBtn');
  document.body.classList.toggle('show-known');
  btn.className = document.body.classList.contains('show-known') ? 'toggle-btn' : 'toggle-btn off';
  btn.textContent = document.body.classList.contains('show-known') ? 'הסתר ידועות' : 'הצג ידועות';
}

function resetKnown() {
  if (!confirm('לאפס את כל המילים הידועות?')) return;
  knownWords = {}; saveKnown();
  document.querySelectorAll('.row.known').forEach(r => r.classList.remove('known'));
  updateCounter();
}

function toggleSentences() {
  showSentences = !showSentences;
  document.getElementById('toggleBtn').className = 'toggle-btn' + (showSentences ? '' : ' off');
  document.querySelectorAll('.sentence-box').forEach(s => s.style.display = showSentences ? '' : 'none');
}

function findNextActive(from) {
  for (let i = from; i < words.length; i++) {
    if (!knownWords[words[i][0]]) return i;
  }
  return -1;
}

function continueReading() { startReading(currentIndex); }
function restartReading() {
  const next = findNextActive(0);
  if (next === -1) { alert('סימנת את כל המילים!'); return; }
  startReading(next);
}

function startReading(fromIndex) {
  const next = findNextActive(fromIndex);
  if (next === -1) { alert('סימנת את כל המילים!'); return; }
  stopFlag = false; isReading = true; currentIndex = next;
  document.getElementById('btnPlay').style.display = 'none';
  document.getElementById('btnRestart').style.display = 'none';
  document.getElementById('btnStop').style.display = 'inline-block';
  readNext();
}

function stopReading() {
  stopFlag = true; isReading = false;
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  document.querySelectorAll('.row.active').forEach(r => r.classList.remove('active'));
  document.getElementById('btnPlay').style.display = 'inline-block';
  document.getElementById('btnStop').style.display = 'none';
  document.getElementById('btnRestart').style.display = currentIndex > 0 ? 'inline-block' : 'none';
  document.getElementById('btnPlay').textContent = currentIndex > 0 ? '▶ המשך' : '▶ הקרא הכל';
  document.getElementById('statusText').textContent = currentIndex > 0 ? `עצרת: ${words[currentIndex]?.[0] || ''}` : 'לחץ על שורה או הקרא הכל';
  document.getElementById('progress').style.width = Math.round((currentIndex / words.length) * 100) + '%';
}

function readNext() {
  if (stopFlag) return;
  const next = findNextActive(currentIndex);
  if (next === -1) {
    document.getElementById('statusText').textContent = '✓ סיימנו!';
    stopReading(); return;
  }
  currentIndex = next;

  document.querySelectorAll('.row.active').forEach(r => r.classList.remove('active'));
  const row = document.getElementById('row-' + currentIndex);
  row.classList.add('active');
  row.scrollIntoView({ behavior: 'smooth', block: 'center' });
  document.getElementById('progress').style.width = Math.round((currentIndex / words.length) * 100) + '%';
  document.getElementById('statusText').textContent = words[currentIndex][0];

  const en = words[currentIndex][0];
  const sentence = words[currentIndex][2];
  const savedIndex = currentIndex;

  // קרא מילה → המתן → קרא משפט
  speakEL(en, () => {
    if (stopFlag) { currentIndex = savedIndex; return; }
    if (!showSentences) {
      currentIndex++;
      setTimeout(readNext, 400);
      return;
    }
    // המתנה של שנייה לחשיבה
    setTimeout(() => {
      if (stopFlag) { currentIndex = savedIndex; return; }
      speakEL(sentence, () => {
        if (stopFlag) { currentIndex = savedIndex; return; }
        currentIndex++;
        setTimeout(readNext, 400);
      });
    }, 0);
  });
}

document.addEventListener('visibilitychange', () => {
  if (!document.hidden && isReading && currentAudio) currentAudio.play();
});
</script>
