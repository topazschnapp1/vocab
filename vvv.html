async function speakEL(text, onEnd) {
  if (stopFlag) { onEnd(); return; }
  const voiceId = voiceMap[document.getElementById('voiceSelect').value] || voiceMap['Rachel'];
  const speed = parseFloat(document.getElementById('speedSelect').value);
  try {
    const res = await fetch('https://api.elevenlabs.io/v1/text-to-speech/' + voiceId, {
      method: 'POST',
      headers: { 'xi-api-key': API_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        text,
        model_id: 'eleven_monolingual_v1',
        voice_settings: { stability: 0.5, similarity_boost: 0.75, speed }
      })
    });
    if (!res.ok) { onEnd(); return; }
    const url = URL.createObjectURL(await res.blob());
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
    currentAudio = new Audio(url);
    currentAudio.onended = () => { URL.revokeObjectURL(url); onEnd(); };
    currentAudio.onerror = () => { URL.revokeObjectURL(url); onEnd(); };
    currentAudio.play();
  } catch(e) { onEnd(); }
}

  ["Acquitted","זוכה, ניקה מאשמה","The court acquitted him of all charges last week."],
  ["Unified","מאוחד","A unified team can achieve almost anything."],
  ["Amusing","משעשע","The children's questions were quite amusing."],
  ["Deserting","עוזב, נוטש","Deserting your post during a crisis is unacceptable."],
  ["Hurrying","ממהר","People were hurrying home before the storm arrived."],
  ["Voyages","מסעות ימיים","His voyages around the world inspired many young sailors."],
  ["Harvests","יבולים, קצירים","The good rains promised excellent harvests this year."],
  ["Evasion","התחמקות","Tax evasion is a serious crime in most countries."],
  ["Speculation","ספקולציה, השערה","There is much speculation about her sudden resignation."],
  ["Contention","טענה, ויכוח","His main contention is that the rules need to change."],
  ["Friction","חיכוך, מתח","There has been some friction between the two departments."],
  ["Grime","לכלוך, פיח","Years of grime covered the old factory windows."],
  ["Humidity","לחות","The humidity in summer makes everything feel sticky."],
  ["Immunization","חיסון","Childhood immunization saves millions of lives every year."],
  ["Crunch","פצפוץ, נגיסה רועשת","I love the crunch of fresh apples."],
  ["Bunch","אגד, צרור","She bought a beautiful bunch of fresh flowers."],
  ["Graded","דורג, נבחן","The papers were graded by two different teachers."],
  ["Greed","חמדנות","His greed eventually led to his downfall."],
  ["Equation","משוואה","The student solved the difficult equation in just two minutes."],
  ["Situated","ממוקם","The hotel is situated near the main beach."],
  ["Defended","הגן","The lawyer defended his client with passion."],
  ["Estate","אחוזה, נכס","The wealthy family owns a large estate in the countryside."],
  ["Amiable","חביב, נעים","The new neighbor seems very amiable and friendly."],
  ["Fatality","תמותה, מקרה מוות","Fortunately, there was no fatality in the car accident."],
  ["Punctuality","דייקנות","Punctuality is highly valued at this company."],
  ["Prestige","יוקרה","The university enjoys great prestige around the world."],
  ["Classes","סוגים, מחלקות / שיעורים","The library divides its books into several classes."],
  ["Modifications","שינויים, התאמות","The engineer suggested several modifications to the design."],
  ["Poles","קטבים, עמודים","The two opinions were complete poles apart."],
  ["Fats","שומנים","Healthy fats are an essential part of your diet."],
  ["Curriculum","תכנית לימודים","The school updated its curriculum for the new year."],
  ["Allowance","קצבה, דמי כיס","Her parents give her a small weekly allowance."],
  ["Shuttle","מעבורת, הסעה","The hotel offers a free shuttle to the airport."]
];

let knownWords = {};
try { knownWords = JSON.parse(localStorage.getItem('knownWords3') || '{}'); } catch(e) {}
function saveKnown() { try { localStorage.setItem('knownWords3', JSON.stringify(knownWords)); } catch(e) {} }

const list = document.getElementById('wordList');
words.forEach((w, i) => {
  const row = document.createElement('div');
  row.className = 'row' + (knownWords[w[0]] ? ' known' : '');
  row.id = 'row-' + i;
  row.innerHTML = `
    <div class="row-top">
      <span class="num">${i+1}</span>
      <span class="en">${w[0]}</span>
      <span class="he">${w[1]}</span>
      <span class="speaker">🔊</span>
      <button class="trash-btn">🗑</button>
    </div>
    <div class="sentence">${w[2]}</div>
  `;
  row.onclick = (e) => {
    if (e.target.classList.contains('he') || e.target.classList.contains('trash-btn')) return;
    if (!isReading) { currentIndex = i; startReading(i); }
  };
  row.querySelector('.he').onclick = (e) => { e.stopPropagation(); e.target.classList.toggle('revealed'); };
  row.querySelector('.trash-btn').onclick = (e) => { e.stopPropagation(); toggleKnown(i); };
  list.appendChild(row);
});

updateCounter();

function toggleKnown(i) {
  const key = words[i][0];
  const row = document.getElementById('row-' + i);
  if (knownWords[key]) { delete knownWords[key]; row.classList.remove('known'); }
  else { knownWords[key] = true; row.classList.add('known'); }
  saveKnown(); updateCounter();
}

function updateCounter() {
  const k = words.filter(w => knownWords[w[0]]).length;
  document.getElementById('counter').innerHTML = `ללימוד: <b>${words.length - k}</b> | יודעת: <b>${k}</b>`;
}

function toggleShowKnown() {
  const btn = document.getElementById('showKnownBtn');
  document.body.classList.toggle('show-known');
  const on = document.body.classList.contains('show-known');
  btn.className = on ? 'toggle-btn' : 'toggle-btn off';
  btn.textContent = on ? 'הסתר ידועות' : 'הצג ידועות';
}

function resetKnown() {
  if (!confirm('לאפס את כל המילים הידועות?')) return;
  knownWords = {}; saveKnown();
  document.querySelectorAll('.row.known').forEach(r => r.classList.remove('known'));
  updateCounter();
}

function toggleSentences() {
  showSentences = !showSentences;
  document.getElementById('toggleBtn').className = 'toggle-btn' + (showSentences ? '' : ' off');
  document.querySelectorAll('.sentence').forEach(s => s.style.display = showSentences ? '' : 'none');
}

function findNextActive(from) {
  for (let i = from; i < words.length; i++) {
    if (!knownWords[words[i][0]]) return i;
  }
  return -1;
}

function continueReading() { startReading(currentIndex); }
function restartReading() {
  const n = findNextActive(0);
  if (n === -1) { alert('סימנת את כל המילים!'); return; }
  startReading(n);
}

function startReading(from) {
  const n = findNextActive(from);
  if (n === -1) { alert('סימנת את כל המילים!'); return; }
  stopFlag = false; isReading = true; currentIndex = n;
  document.getElementById('btnPlay').style.display = 'none';
  document.getElementById('btnRestart').style.display = 'none';
  document.getElementById('btnStop').style.display = 'inline-block';
  readNext();
}

function stopReading() {
  stopFlag = true; isReading = false;
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  document.querySelectorAll('.row.active').forEach(r => r.classList.remove('active'));
  document.getElementById('btnPlay').style.display = 'inline-block';
  document.getElementById('btnStop').style.display = 'none';
  document.getElementById('btnRestart').style.display = currentIndex > 0 ? 'inline-block' : 'none';
  document.getElementById('btnPlay').textContent = currentIndex > 0 ? '▶ המשך' : '▶ הקרא הכל';
  document.getElementById('statusText').textContent = currentIndex > 0 ? `עצרת: ${words[currentIndex]?.[0] || ''}` : 'לחץ על שורה או הקרא הכל';
  document.getElementById('progress').style.width = Math.round((currentIndex / words.length) * 100) + '%';
}

function readNext() {
  if (stopFlag) return;
  const n = findNextActive(currentIndex);
  if (n === -1) {
    document.getElementById('statusText').textContent = '✓ סיימנו!';
    stopReading(); return;
  }
  currentIndex = n;

  document.querySelectorAll('.row.active').forEach(r => r.classList.remove('active'));
  const row = document.getElementById('row-' + currentIndex);
  row.classList.add('active');
  row.scrollIntoView({ behavior: 'smooth', block: 'center' });
  document.getElementById('progress').style.width = Math.round((currentIndex / words.length) * 100) + '%';
  document.getElementById('statusText').textContent = words[currentIndex][0];

  const savedIndex = currentIndex;
  const en = words[currentIndex][0];
  const sentence = words[currentIndex][2];

  speakEL(en, () => {
    if (stopFlag) { currentIndex = savedIndex; return; }
    if (showSentences) {
      speakEL(sentence, () => {
        if (stopFlag) { currentIndex = savedIndex; return; }
        currentIndex++;
        setTimeout(readNext, 400);
      });
    } else {
      currentIndex++;
      setTimeout(readNext, 400);
    }
  });
}

document.addEventListener('visibilitychange', () => {
  if (!document.hidden && isReading && currentAudio) currentAudio.play();
});
</script>
</body>
</html>
