let currentAudio = null;

async function speakEL(text, onEnd) {
  if (stopFlag) { onEnd(); return; }
  const voiceId = voiceMap[document.getElementById('voiceSelect').value] || voiceMap['Rachel'];
  const speed = parseFloat(document.getElementById('speedSelect').value);
  try {
    const res = await fetch('https://api.elevenlabs.io/v1/text-to-speech/' + voiceId, {
      method: 'POST',
      headers: { 'xi-api-key': API_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        text,
        model_id: 'eleven_monolingual_v1',
        voice_settings: { stability: 0.5, similarity_boost: 0.75, speed }
      })
    });
    if (!res.ok) { onEnd(); return; }
    const url = URL.createObjectURL(await res.blob());
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
    currentAudio = new Audio(url);
    currentAudio.onended = () => { URL.revokeObjectURL(url); onEnd(); };
    currentAudio.onerror = () => { URL.revokeObjectURL(url); onEnd(); };
    currentAudio.play();
  } catch(e) { onEnd(); }
}

  ["Coincide","להקביל","The festival happens to coincide with the national holiday this year."],
  ["Successor","יורש","Choosing a worthy successor is the most important task of any leader."],
  ["Drench","להרטיב","The unexpected rainstorm will drench anyone without an umbrella."],
  ["Manifest","מובהק","His leadership abilities were manifest even during his childhood."],
  ["Fellow","עמית","She collaborated closely with a fellow scientist from another university."],
  ["Solicit","לבקש","Nonprofits regularly solicit contributions from businesses and private donors."]
];

let showSentences = true;
let removedWords = new Set();
let showRemoved = false;
let isReading = false;
let currentIndex = 0;
let stopFlag = false;

function loadRemoved() {
  try {
    const saved = localStorage.getItem('removedWords_v3');
    if (saved) return new Set(JSON.parse(saved));
  } catch(e) {}
  return new Set();
}
removedWords = loadRemoved();

function saveRemoved() {
  try { localStorage.setItem('removedWords_v3', JSON.stringify([...removedWords])); } catch(e) {}
}

const list = document.getElementById('wordList');
words.forEach((w, i) => {
  const row = document.createElement('div');
  row.className = 'row';
  row.id = 'row-' + i;
  row.innerHTML = `
    <div class="row-top">
      <span class="num">${i+1}</span>
      <button class="remove-btn" title="הסר">🗑</button>
      <span class="en">${w[0]}</span>
      <span class="he-word hidden" data-text="${w[1].replace(/"/g, '&quot;')}"></span>
      <span class="speaker">🔊</span>
    </div>
    <div class="sentence">${w[2]}</div>
  `;
  row.querySelector('.en').onclick = (e) => {
    e.stopPropagation();
    if (!isReading) { currentIndex = i; startReading(i); }
  };
  row.querySelector('.sentence').onclick = (e) => {
    e.stopPropagation();
    if (!isReading) { currentIndex = i; startReading(i); }
  };
  const heWord = row.querySelector('.he-word');
  heWord.onclick = (e) => {
    e.stopPropagation();
    if (heWord.classList.contains('hidden')) {
      heWord.classList.remove('hidden');
      heWord.textContent = heWord.dataset.text;
    } else {
      heWord.classList.add('hidden');
      heWord.textContent = '';
    }
  };
  row.querySelector('.remove-btn').onclick = (e) => {
    e.stopPropagation();
    toggleRemoved(i);
  };
  list.appendChild(row);
});

applyRemovedState();

function toggleRemoved(i) {
  const row = document.getElementById('row-' + i);
  if (removedWords.has(i)) {
    removedWords.delete(i);
    row.classList.remove('removed', 'removed-visible');
  } else {
    removedWords.add(i);
    row.classList.add(showRemoved ? 'removed-visible' : 'removed');
  }
  saveRemoved(); updateCounter();
}

function applyRemovedState() {
  words.forEach((_, i) => {
    const row = document.getElementById('row-' + i);
    if (removedWords.has(i)) {
      row.classList.add(showRemoved ? 'removed-visible' : 'removed');
      row.classList.remove(showRemoved ? 'removed' : 'removed-visible');
    } else {
      row.classList.remove('removed', 'removed-visible');
    }
  });
  updateCounter();
}

function toggleShowRemoved() {
  showRemoved = !showRemoved;
  document.getElementById('toggleRemovedBtn').textContent = showRemoved ? '🙈 הסתר מוסרות' : '👀 הצג מוסרות';
  applyRemovedState();
}

function resetRemoved() {
  if (removedWords.size === 0) { alert('אין מילים מוסרות'); return; }
  if (!confirm(`להחזיר את כל ${removedWords.size} המילים המוסרות?`)) return;
  removedWords.clear(); saveRemoved(); applyRemovedState();
}

function updateCounter() {
  document.getElementById('counter').textContent = `${words.length - removedWords.size} / ${words.length}`;
}

function hideAllTranslations() {
  document.querySelectorAll('.he-word').forEach(el => {
    el.classList.add('hidden'); el.textContent = '';
  });
}

function showAllTranslations() {
  document.querySelectorAll('.he-word').forEach(el => {
    el.classList.remove('hidden'); el.textContent = el.dataset.text;
  });
}

function toggleSentences() {
  showSentences = !showSentences;
  document.getElementById('toggleBtn').className = 'toggle-btn' + (showSentences ? '' : ' off');
  document.querySelectorAll('.sentence').forEach(s => s.style.display = showSentences ? '' : 'none');
}

function continueReading() { startReading(currentIndex); }
function restartReading() {
  currentIndex = 0;
  while (currentIndex < words.length && removedWords.has(currentIndex)) currentIndex++;
  startReading(currentIndex);
}

function startReading(from) {
  stopFlag = false; isReading = true; currentIndex = from;
  document.getElementById('btnPlay').style.display = 'none';
  document.getElementById('btnRestart').style.display = 'none';
  document.getElementById('btnStop').style.display = 'inline-block';
  readNext();
}

function stopReading() {
  stopFlag = true; isReading = false;
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  document.querySelectorAll('.row.active').forEach(r => r.classList.remove('active'));
  document.getElementById('btnPlay').style.display = 'inline-block';
  document.getElementById('btnStop').style.display = 'none';
  document.getElementById('btnRestart').style.display = currentIndex > 0 ? 'inline-block' : 'none';
  document.getElementById('btnPlay').textContent = currentIndex > 0 ? '▶ המשך' : '▶ הקרא הכל';
  document.getElementById('statusText').textContent = currentIndex > 0 && currentIndex < words.length ? `עצרת: ${words[currentIndex]?.[0] || ''}` : 'לחץ על מילה או הקרא הכל';
  document.getElementById('progress').style.width = Math.round((currentIndex / words.length) * 100) + '%';
}

function readNext() {
  while (!stopFlag && currentIndex < words.length && removedWords.has(currentIndex)) currentIndex++;
  if (stopFlag || currentIndex >= words.length) {
    if (!stopFlag) document.getElementById('statusText').textContent = '✓ סיימנו!';
    stopReading(); return;
  }

  document.querySelectorAll('.row.active').forEach(r => r.classList.remove('active'));
  const row = document.getElementById('row-' + currentIndex);
  row.classList.add('active');
  row.scrollIntoView({ behavior: 'smooth', block: 'center' });
  document.getElementById('progress').style.width = Math.round((currentIndex / words.length) * 100) + '%';
  document.getElementById('statusText').textContent = words[currentIndex][0];

  const savedIndex = currentIndex;
  const en = words[currentIndex][0];
  const sentence = words[currentIndex][2];

  speakEL(en, () => {
    if (stopFlag) { currentIndex = savedIndex; return; }
    if (showSentences) {
      speakEL(sentence, () => {
        if (stopFlag) { currentIndex = savedIndex; return; }
        currentIndex++;
        setTimeout(readNext, 400);
      });
    } else {
      currentIndex++;
      setTimeout(readNext, 400);
    }
  });
}

document.addEventListener('visibilitychange', () => {
  if (!document.hidden && isReading && currentAudio) currentAudio.play();
});
</script>
</body>
</html>
