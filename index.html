<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #111;
    color: #f0f0f0;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    padding-bottom: 100px;
  }

  .sticky-bar {
    position: sticky;
    top: 0;
    background: #111;
    z-index: 99;
    padding: 10px 14px;
    border-bottom: 1px solid #2a2a2a;
  }
  .bar-row1 {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }
  .title { flex: 1; font-size: 0.8rem; color: #777; min-width: 80px; }

  .btn {
    padding: 9px 18px;
    border-radius: 24px;
    border: none;
    font-size: 0.92rem;
    font-weight: 700;
    cursor: pointer;
  }
  .btn:active { opacity: 0.7; }
  #btnPlay { background: #f0c040; color: #111; }
  #btnStop { background: #ff4444; color: #fff; display: none; }
  #btnRestart { background: #333; color: #aaa; border: 1px solid #444; font-size: 0.8rem; padding: 7px 12px; display: none; }

  .toggle-btn {
    background: #1a3a1a; color: #6fda6f;
    border: 1px solid #3a6a3a;
    padding: 7px 12px; border-radius: 20px;
    font-size: 0.78rem; cursor: pointer;
  }
  .toggle-btn.off { background: #222; color: #666; border-color: #333; }

  .bar-row2 { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .voice-group { display: flex; align-items: center; gap: 5px; flex: 1; min-width: 180px; }
  .voice-label { font-size: 0.72rem; color: #666; white-space: nowrap; }
  select {
    flex: 1; background: #1e1e1e; color: #ddd;
    border: 1px solid #333; border-radius: 8px;
    padding: 5px 8px; font-size: 0.75rem; outline: none;
  }

  .progress {
    position: fixed; top: 0; left: 0;
    height: 3px; background: #f0c040;
    width: 0; transition: width 0.3s; z-index: 999;
  }

  .words { padding: 6px 0; }

  .row {
    padding: 13px 16px;
    border-bottom: 1px solid #1e1e1e;
    scroll-margin-top: 90px;
    transition: background 0.2s;
    cursor: pointer;
  }
  .row:active { background: #1a1a1a; }
  .row.active { background: #1c1800; }
  .row.removed { opacity: 0.3; text-decoration: line-through; background: #1a0000; }

  .row-top { display: flex; align-items: center; gap: 10px; }
  .num { font-size: 0.7rem; color: #444; min-width: 26px; }
  .en { font-size: 1.05rem; font-weight: 700; flex: 1; color: #fff; }
  .row.active .en { color: #f0c040; }

  .speaker { font-size: 1rem; opacity: 0; flex-shrink: 0; }
  .row.active .speaker { opacity: 1; animation: pulse 0.7s ease-in-out infinite alternate; }
  @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.3); } }

  .sentence {
    margin-top: 7px; padding-right: 36px;
    font-size: 0.82rem; color: #555;
    font-style: italic; line-height: 1.4;
  }
  .row.active .sentence { color: #999; }

  .he-wrap {
    margin-top: 7px;
    padding: 8px 8px 8px 36px;
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.03);
    border-radius: 8px;
    cursor: pointer;
    -webkit-tap-highlight-color: rgba(255,255,255,0.1);
  }
  .he-text {
    font-size: 0.88rem;
    color: #888;
    direction: rtl;
    filter: blur(6px);
    transition: filter 0.3s;
    user-select: none;
    pointer-events: none;
    flex: 1;
  }
  .he-wrap.revealed .he-text { filter: none; }
  .reveal-hint {
    font-size: 0.7rem;
    color: #555;
    white-space: nowrap;
    pointer-events: none;
  }
  .he-wrap.revealed .reveal-hint { display: none; }

  .remove-btn {
    background: rgba(255,60,60,0.15);
    border: 1px solid rgba(255,60,60,0.3);
    color: #ff6060; border-radius: 6px;
    padding: 4px 10px; font-size: 0.8rem;
    cursor: pointer; flex-shrink: 0; display: none;
  }
  .edit-mode .remove-btn { display: inline-block; }
  .row.removed .remove-btn { background: rgba(60,200,60,0.15); border-color: rgba(60,200,60,0.3); color: #60cc60; }

  .loading-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #f0c040;
    animation: blink 0.8s infinite;
    margin-right: 4px;
  }
  @keyframes blink { 0%,100% { opacity: 0.2; } 50% { opacity: 1; } }
</style>

function revealHe(e, i) {
  e.stopPropagation();
  e.currentTarget.classList.toggle('revealed');
}

function toggleEditMode() {
  editMode = !editMode;
  const btn = document.getElementById('editBtn');
  btn.className = 'toggle-btn' + (editMode ? ' on' : '');
  btn.textContent = editMode ? '✓ סיום' : '🗑 הסר';
  document.getElementById('wordList').classList.toggle('edit-mode', editMode);
}

function toggleRemove(e, i) {
  e.stopPropagation();
  const row = document.getElementById('row-' + i);
  const btn = row.querySelector('.remove-btn');
  if (removedWords.has(i)) {
    removedWords.delete(i);
    row.classList.remove('removed');
    btn.textContent = 'הסר';
  } else {
    removedWords.add(i);
    row.classList.add('removed');
    btn.textContent = 'שחזר';
  }
  localStorage.setItem('removedWords2', JSON.stringify([...removedWords]));
}

  document.querySelectorAll('.sentence').forEach(s => s.style.display = showSentences ? '' : 'none');
}

let isReading = false, currentIndex = 0, stopFlag = false;

function continueReading() { startReading(currentIndex); }
function restartReading() { currentIndex = 0; startReading(0); }

function startReading(fromIndex = 0) {
  stopFlag = false; isReading = true; currentIndex = fromIndex;
  document.getElementById('btnPlay').style.display = 'none';
  document.getElementById('btnRestart').style.display = 'none';
  document.getElementById('btnStop').style.display = 'inline-block';
  readNext();
}

function stopReading() {
  stopFlag = true; isReading = false;
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  document.querySelectorAll('.row.active').forEach(r => r.classList.remove('active'));
  document.getElementById('btnPlay').style.display = 'inline-block';
  document.getElementById('btnStop').style.display = 'none';
  document.getElementById('btnRestart').style.display = currentIndex > 0 ? 'inline-block' : 'none';
  document.getElementById('btnPlay').textContent = currentIndex > 0 ? '▶ המשך' : '▶ הקרא הכל';
  document.getElementById('statusText').textContent = currentIndex > 0 ? `עצרת במילה ${currentIndex+1}: ${words[currentIndex]?.[0]||''}` : 'לחץ על מילה או הקרא הכל';
  document.getElementById('progress').style.width = Math.round((currentIndex/words.length)*100)+'%';
}

function readNext() {
  while (currentIndex < words.length && removedWords.has(currentIndex)) currentIndex++;
  if (stopFlag || currentIndex >= words.length) {
    if (!stopFlag) document.getElementById('statusText').textContent = '✓ סיימנו!';
    stopReading(); return;
  }

  document.querySelectorAll('.row.active').forEach(r => r.classList.remove('active'));
  const row = document.getElementById('row-' + currentIndex);
  row.classList.add('active');
  row.scrollIntoView({ behavior: 'smooth', block: 'center' });

  document.getElementById('progress').style.width = Math.round((currentIndex/words.length)*100)+'%';
  document.getElementById('statusText').textContent = words[currentIndex][0];

  const savedIndex = currentIndex;

  speakElevenLabs(words[currentIndex][0], () => {
    if (stopFlag) { currentIndex = savedIndex; return; }
    if (showSentences) {
      speakElevenLabs(words[currentIndex][2], () => {
        if (stopFlag) { currentIndex = savedIndex; return; }
        currentIndex++;
        setTimeout(readNext, 300);
      });
    } else {
      currentIndex++;
      setTimeout(readNext, 300);
    }
  });
}
